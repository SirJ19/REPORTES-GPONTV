<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPON TV • Reporte NOC</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        * {
            transition-property: color, background-color, border-color, text-decoration-color, fill, stroke;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 150ms;
        }
        .channel-card { transition: all 0.2s ease; }
        .channel-card:hover { background-color: #1a1a1a; }
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333333;
            border-radius: 9999px;
            border: 2px solid #555555;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #22c55e;
            border-color: #22c55e;
        }
        input:checked + .slider:before {
            transform: translateX(22px);
        }
        .status-ok { background-color: #22c55e; color: #ffffff !important; font-weight: 700; }
        .status-problem { background-color: #ef4444; color: #ffffff; font-weight: 700; }
        .status-text { font-family: 'Inter', system_ui, sans-serif; font-size: 1rem; font-weight: 600; letter-spacing: 0.5px; }
        .text-yes { color: #22c55e; font-weight: 700; }
        .text-no { color: #ef4444; font-weight: 700; letter-spacing: 1px; }
        body.light { background-color: #f8fafc; color: #0f172a; }
        body.light .bg-black { background-color: #ffffff !important; }
        body.light .bg-zinc-900 { background-color: #f1f5f9 !important; }
        body.light .bg-zinc-950 { background-color: #f8fafc !important; }
        body.light .border-zinc-800 { border-color: #e2e8f0 !important; }
        body.light .text-slate-200 { color: #0f172a !important; }
        body.light .text-white { color: #0f172a !important; }
        body.light .text-slate-400 { color: #64748b !important; }
        body.light .channel-card:hover { background-color: #f1f5f9 !important; }
    </style>
</head>
<body class="bg-black text-slate-200 min-h-screen font-sans">
    <div class="max-w-5xl mx-auto px-6 py-8">
        <!-- HEADER -->
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-orange-0 rounded-2xl flex items-center justify-center text-5xl">📺</div>
                <div>
                    <h1 class="text-3xl font-semibold tracking-tight text-orange-500" style="text-shadow: 0 0 10px rgba(249,115,22,0.35), 0 2px 12px rgba(249,115,22,0.18);" > GPON TV </h1>
                    <p class="text-white text-sm">NOC REPORTE DE CANALES</p>
                </div>
            </div>
    
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-8">
                    <div class="text-right">
                        <div class="text-xs text-slate-400">TOTAL</div>
                        <div id="total-channels" class="text-4xl font-semibold">0</div>
                    </div>
                    <div class="text-right">
                        <div class="text-xs text-slate-400">INCIDENCIAS</div>
                        <div id="incidents-count" class="text-4xl font-semibold text-red-400">0</div>
                    </div>
                </div>
                <button onclick="toggleForm()" id="toggle-form-btn"
                        class="flex items-center gap-2 px-5 py-2.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-3xl text-sm font-medium">
                    <span id="form-icon">▲</span>
                    <span id="form-text">Formulario</span>
                </button>
            </div>
        </div>

        <!-- BOTÓN TEMA -->
        <button onclick="toggleTheme()" id="theme-toggle"
                class="fixed top-6 right-6 z-50 flex items-center justify-center w-12 h-12 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-3xl text-2xl shadow-xl">
            🌙
        </button>

        <!-- FORMULARIO + BUSCADOR -->
        <div id="form-container" class="bg-black border border-zinc-800 rounded-3xl p-5 mb-7">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-3 text-white">➕ Agregar nuevo canal</h2>
            <div class="flex gap-4">
                <div class="w-28">
                    <label class="block text-xs font-medium text-slate-400 mb-1">NÚMERO</label>
                    <input id="channel-number" type="text" placeholder="7"
                           class="w-full bg-zinc-950 border border-zinc-800 focus:border-orange-400 rounded-2xl px-5 py-4 text-2xl font-mono font-bold outline-none text-center">
                </div>
                <div class="flex-1">
                    <label class="block text-xs font-medium text-slate-400 mb-1">NOMBRE DEL CANAL</label>
                    <input id="channel-name" type="text" placeholder="América TV"
                           class="w-full bg-zinc-950 border border-zinc-800 focus:border-orange-400 rounded-2xl px-5 py-4 text-lg outline-none">
                </div>
                <button onclick="addChannel()"
                        class="mt-6 bg-orange-500 hover:bg-orange-400 text-black font-bold px-8 py-4 rounded-3xl text-base shadow-lg">
                    AGREGAR
                </button>
            </div>

            <!-- BUSCADOR -->
            <div class="mt-6 pt-5 border-t border-zinc-800">
                <label class="block text-xs font-medium text-slate-400 mb-1">BUSCAR</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm">🔍</span>
                    <input
                        id="search-input"
                        type="text"
                        placeholder="Buscar canal..."
                        oninput="updateSearch(this.value)"
                        class="w-full bg-zinc-950 border border-zinc-800 focus:border-orange-400 rounded-2xl pl-12 pr-5 py-4 text-base outline-none"
                    >
                </div>
            </div>
        </div>

        <!-- LISTADO -->
        <div class="flex justify-between items-center mb-5">
            <h2 id="view-title" class="text-2xl font-semibold text-white">Todos los canales</h2>
            <div class="flex gap-3">
                <button onclick="clearAllChannels()" class="flex items-center gap-2 px-5 py-2.5 bg-zinc-950 hover:bg-red-500/10 hover:text-red-400 border border-zinc-800 rounded-3xl text-sm font-medium">
                    🗑️ BORRAR TODO
                </button>
                <button onclick="toggleFilter()" id="filter-button"
                        class="flex items-center gap-3 px-5 py-2.5 bg-zinc-950 hover:bg-orange-500/10 border border-zinc-800 rounded-3xl text-sm font-medium">
                    <span id="filter-icon">🔴</span>
                    <span id="filter-text">SOLO INCIDENCIAS</span>
                </button>
            </div>
        </div>
        <div id="channels-list" class="space-y-2"></div>
        <div id="empty-state" class="hidden text-center py-16">
            <div class="text-6xl mb-4">📺</div>
            <h3 id="empty-title" class="text-2xl font-medium text-white">No hay canales aún</h3>
            <p id="empty-subtitle" class="text-slate-400 mt-2">Agrega canales usando el formulario superior</p>
        </div>
    </div>

    <!-- BARRA INFERIOR -->
    <div class="fixed bottom-8 right-8 bg-black border border-zinc-800 rounded-3xl px-6 py-3 flex items-center gap-4 shadow-2xl">
        <div onclick="toggleFilter()" class="cursor-pointer flex items-center gap-3">
            <div id="footer-dot" class="w-3.5 h-3.5 bg-orange-500 rounded-full"></div>
            <span id="footer-text" class="font-medium text-sm">0 incidencias</span>
        </div>
        <button onclick="exportData()" class="text-xs px-4 py-1.5 hover:bg-zinc-950 border border-zinc-800 rounded-2xl">
            Exportar CSV
        </button>
        <label class="text-xs px-4 py-1.5 hover:bg-zinc-950 border border-zinc-800 rounded-2xl cursor-pointer">
            Importar CSV
            <input type="file" id="import-file" accept=".csv" class="hidden" onchange="importCSV(this)">
        </label>
    </div>

    <script>
        // ==================== SUPABASE CONFIG ====================
        const supabaseUrl = 'https://eongnockquilwrsbcfyl.supabase.co';
        const supabaseKey = 'sb_publishable_tPgHuR7fjTFhEEX-rHk8BQ_TD15xsIf';
        const sb = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        let channels = [];
        let filterOnlyIncidents = false;
        let formVisible = true;
        let isDarkMode = true;
        let searchQuery = '';

        // ==================== SUPABASE FUNCTIONS ====================
        async function saveChannels() {
            try {
                await sb.from('GPONTV').delete().gte('id', 0);
                if (channels.length > 0) {
                    const { data: inserted, error } = await sb
                        .from('GPONTV')
                        .insert(
                            channels.map(ch => ({
                                number: ch.number,
                                name: ch.name,
                                image: ch.image,
                                sound: ch.sound
                            }))
                        )
                        .select();
                    if (error) {
                        console.error('Insert error:', error);
                        alert('Error al guardar: ' + error.message);
                        return;
                    }
                    if (inserted) {
                        channels = inserted.map((ch, i) => ({
                            id: ch.id,
                            number: ch.number,
                            name: ch.name,
                            image: channels[i].image,
                            sound: channels[i].sound
                        }));
                    }
                }
            } catch (err) {
                console.error('saveChannels error:', err);
                alert('Error de conexión con Supabase');
            }
        }

        async function loadChannels() {
            try {
                const { data, error } = await sb
                    .from('GPONTV')
                    .select('*')
                    .order('number', { ascending: true });
                if (error) {
                    console.error('Load error:', error);
                    return;
                }
                channels = data ? data.map(ch => ({
                    id: ch.id,
                    number: ch.number,
                    name: ch.name,
                    image: ch.image,
                    sound: ch.sound
                })) : [];
            } catch (err) {
                console.error('loadChannels error:', err);
            }
        }

        // ==================== HELPERS ====================
        function hasProblem(channel) {
            return !channel.image || !channel.sound;
        }

        function sortChannels() {
            channels.sort((a, b) => parseInt(a.number) - parseInt(b.number));
        }

        // ==================== RENDER ====================
        function renderChannels() {
            sortChannels();
            const container = document.getElementById('channels-list');
            const empty = document.getElementById('empty-state');
            const totalEl = document.getElementById('total-channels');
            const incidentsEl = document.getElementById('incidents-count');
            const viewTitle = document.getElementById('view-title');
            const footerDot = document.getElementById('footer-dot');
            const footerText = document.getElementById('footer-text');

            let displayed = filterOnlyIncidents 
                ? channels.filter(ch => hasProblem(ch)) 
                : [...channels];

            if (searchQuery) {
                displayed = displayed.filter(ch =>
                    ch.number.toString().includes(searchQuery) ||
                    ch.name.toLowerCase().includes(searchQuery)
                );
            }

            totalEl.textContent = channels.length;
            const incidentCount = channels.filter(ch => hasProblem(ch)).length;
            incidentsEl.textContent = incidentCount;
            footerText.textContent = `${incidentCount} incidencias`;
            footerDot.className = incidentCount > 0
                ? "w-3.5 h-3.5 bg-red-500 rounded-full animate-pulse"
                : "w-3.5 h-3.5 bg-orange-500 rounded-full";

            viewTitle.textContent = filterOnlyIncidents
                ? `Canales con incidencias (${displayed.length})`
                : `Todos los canales (${channels.length})`;

            container.innerHTML = '';

            if (displayed.length === 0) {
                empty.classList.remove('hidden');
                
                const title = document.getElementById('empty-title');
                const subtitle = document.getElementById('empty-subtitle');
                
                if (searchQuery) {
                    title.textContent = "No se encontraron canales";
                    subtitle.textContent = "Prueba con otro número o nombre";
                } else {
                    title.textContent = "No hay canales aún";
                    subtitle.textContent = "Agrega canales usando el formulario superior";
                }
                return;
            }

            empty.classList.add('hidden');

            displayed.forEach(channel => {
                const problem = hasProblem(channel);
                const card = document.createElement('div');
                card.className = `channel-card flex items-center justify-between bg-black border ${problem ? 'border-red-500' : 'border-zinc-800'} rounded-3xl px-6 py-4`;
                card.innerHTML = `
                    <div class="flex items-center gap-6">
                        <div class="w-14 text-center">
                            <div class="text-3xl font-mono font-bold text-orange-400">#${channel.number}</div>
                        </div>
                        <div><div class="text-xl font-semibold">${channel.name}</div></div>
                    </div>
                    <div class="flex items-center gap-8">
                        <div class="flex items-center gap-3">
                            <span class="text-white font-medium w-14 text-sm">IMAGEN</span>
                            <span class="status-text ${channel.image ? 'text-yes' : 'text-no'}">${channel.image ? 'SÍ' : 'NO'}</span>
                            <label class="switch">
                                <input type="checkbox" ${channel.image ? 'checked' : ''} onchange="updateImage(${channel.id}, this.checked)">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-white font-medium w-14 text-sm">AUDIO</span>
                            <span class="status-text ${channel.sound ? 'text-yes' : 'text-no'}">${channel.sound ? 'SÍ' : 'NO'}</span>
                            <label class="switch">
                                <input type="checkbox" ${channel.sound ? 'checked' : ''} onchange="updateSound(${channel.id}, this.checked)">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="${problem ? 'status-problem' : 'status-ok'} px-6 py-2 rounded-3xl font-bold text-base shadow-inner min-w-[110px] text-center">
                            ${problem ? 'INCIDENCIA' : 'ESTABLE'}
                        </div>
                        <button onclick="deleteChannel(${channel.id})" class="ml-3 text-2xl text-slate-400 hover:text-red-400">✕</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // ==================== CRUD ====================
        async function addChannel() {
            const number = document.getElementById('channel-number').value.trim();
            const name = document.getElementById('channel-name').value.trim();
            if (!number || !name) {
                alert("Por favor ingresa el número y nombre del canal");
                return;
            }
            if (channels.some(ch => ch.number === number)) {
                if (!confirm(`Ya existe un canal con el número ${number}. ¿Agregar de todas formas?`)) return;
            }
            channels.push({ id: Date.now(), number, name, image: true, sound: true });
            await saveChannels();
            document.getElementById('channel-number').value = '';
            document.getElementById('channel-name').value = '';
            renderChannels();
        }

        async function deleteChannel(id) {
            if (confirm("¿Eliminar este canal?")) {
                channels = channels.filter(ch => ch.id !== id);
                await saveChannels();
                renderChannels();
            }
        }

        async function clearAllChannels() {
            if (confirm("¿Estás seguro de borrar TODA la lista?\nEsta acción no se puede deshacer.")) {
                channels = [];
                await saveChannels();
                renderChannels();
            }
        }

        async function updateImage(id, value) {
            const ch = channels.find(c => c.id === id);
            if (ch) ch.image = value;
            await saveChannels();
            renderChannels();
        }

        async function updateSound(id, value) {
            const ch = channels.find(c => c.id === id);
            if (ch) ch.sound = value;
            await saveChannels();
            renderChannels();
        }

        // ==================== BUSCADOR ====================
        function updateSearch(value) {
            searchQuery = value.toLowerCase().trim();
            renderChannels();
        }

        // ==================== OTRAS FUNCIONES ====================
        function toggleForm() {
            formVisible = !formVisible;
            const formContainer = document.getElementById('form-container');
            const formIcon = document.getElementById('form-icon');
            formContainer.style.display = formVisible ? 'block' : 'none';
            formIcon.textContent = formVisible ? '▲' : '▼';
            localStorage.setItem('formVisible', formVisible);
        }

        function toggleFilter() {
            filterOnlyIncidents = !filterOnlyIncidents;
            const btn = document.getElementById('filter-button');
            const icon = document.getElementById('filter-icon');
            const text = document.getElementById('filter-text');
            if (filterOnlyIncidents) {
                icon.textContent = '📋';
                text.textContent = 'TODOS';
                btn.classList.add('bg-orange-500', 'text-white');
            } else {
                icon.textContent = '🔴';
                text.textContent = 'SOLO INCIDENCIAS';
                btn.classList.remove('bg-orange-500', 'text-white');
            }
            renderChannels();
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            const body = document.body;
            const toggleBtn = document.getElementById('theme-toggle');
            if (isDarkMode) {
                body.classList.remove('light');
                toggleBtn.innerHTML = '☀️';
            } else {
                body.classList.add('light');
                toggleBtn.innerHTML = '🌙';
            }
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
        }

        function exportData() {
            if (channels.length === 0) return alert("No hay datos para exportar");
            let csv = "Número,Nombre,Imagen,Audio,Estado\n";
            channels.forEach(ch => {
                const estado = hasProblem(ch) ? "INCIDENCIA" : "ESTABLE";
                csv += `${ch.number},${ch.name},${ch.image ? "SÍ" : "NO"},${ch.sound ? "SÍ" : "NO"},${estado}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `gpon_tv_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
        }

        function importCSV(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                const lines = e.target.result.trim().split('\n');
                const newChannels = [];
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    const [number, name, image, sound] = lines[i].split(',').map(s => s.trim());
                    if (number && name) {
                        newChannels.push({
                            id: Date.now() + i,
                            number,
                            name,
                            image: image === "SÍ",
                            sound: sound === "SÍ"
                        });
                    }
                }
                if (newChannels.length > 0) {
                    if (channels.length > 0 && !confirm(`¿Reemplazar los ${channels.length} canales actuales?`)) return;
                    channels = newChannels;
                    await saveChannels();
                    filterOnlyIncidents = false;
                    searchQuery = '';
                    document.getElementById('search-input').value = '';
                    renderChannels();
                    alert(`Se importaron ${newChannels.length} canales`);
                }
            };
            reader.readAsText(file);
            input.value = '';
        }

        // ==================== INIT ====================
        window.onload = async () => {
            if (localStorage.getItem('theme') === 'light') {
                isDarkMode = false;
                document.body.classList.add('light');
                document.getElementById('theme-toggle').innerHTML = '☀️';
            }
            const savedForm = localStorage.getItem('formVisible');
            formVisible = savedForm !== 'false';
            const formContainer = document.getElementById('form-container');
            const formIcon = document.getElementById('form-icon');
            formContainer.style.display = formVisible ? 'block' : 'none';
            formIcon.textContent = formVisible ? '▲' : '▼';

            await loadChannels();
            renderChannels();

            document.getElementById('channel-name').addEventListener('keypress', e => {
                if (e.key === 'Enter') addChannel();
            });
        };
    </script>
</body>
</html>
