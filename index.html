<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPON TV • Reporte NOC</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        * {
            transition-property: color, background-color, border-color, text-decoration-color, fill, stroke;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 150ms;
        }
        .channel-card { transition: all 0.2s ease; }
        .channel-card:hover { background-color: #1a1a1a; }
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333333;
            border-radius: 9999px;
            border: 2px solid #555555;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #22c55e;
            border-color: #22c55e;
        }
        input:checked + .slider:before {
            transform: translateX(22px);
        }
        .status-ok { background-color: #22c55e; color: #ffffff !important; font-weight: 700; }
        .status-problem { background-color: #ef4444; color: #ffffff; font-weight: 700; }
        .status-text { font-family: 'Inter', system-ui, sans-serif; font-size: 1rem; font-weight: 600; letter-spacing: 0.5px; }
        .text-yes { color: #22c55e; font-weight: 700; }
        .text-no { color: #ef4444; font-weight: 700; letter-spacing: 1px; }
        body.light { background-color: #f8fafc; color: #0f172a; }
        body.light .bg-black { background-color: #ffffff !important; }
        body.light .bg-zinc-900 { background-color: #f1f5f9 !important; }
        body.light .bg-zinc-950 { background-color: #f8fafc !important; }
        body.light .border-zinc-800 { border-color: #e2e8f0 !important; }
        body.light .text-slate-200 { color: #0f172a !important; }
        body.light .text-white { color: #0f172a !important; }
        body.light .text-slate-400 { color: #64748b !important; }
        body.light .channel-card:hover { background-color: #f1f5f9 !important; }

        /* Timer de avería */
        .incident-timer {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.35);
            border-radius: 9999px;
            padding: 2px 10px;
            font-family: 'Space Grotesk', monospace;
            font-size: 0.72rem;
            font-weight: 600;
            color: #fca5a5;
            letter-spacing: 0.5px;
            white-space: nowrap;
            animation: pulse-border 2s ease-in-out infinite;
        }
        @keyframes pulse-border {
            0%, 100% { border-color: rgba(239,68,68,0.35); }
            50% { border-color: rgba(239,68,68,0.75); }
        }
        .incident-timer .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #ef4444;
            animation: blink 1s step-start infinite;
            flex-shrink: 0;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        body.light .incident-timer {
            background: rgba(239,68,68,0.08);
            color: #b91c1c;
        }

        /* Loading overlay */
        #loading-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; backdrop-filter: blur(4px);
        }
        #loading-overlay.hidden { display: none; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #333;
            border-top-color: #f97316;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-black text-slate-200 min-h-screen font-sans">

    <div id="loading-overlay">
        <div class="flex flex-col items-center gap-4">
            <div class="spinner"></div>
            <span class="text-slate-400 text-sm">Cargando...</span>
        </div>
    </div>

    <div class="max-w-5xl mx-auto px-6 py-8">
        <!-- HEADER -->
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-orange-0 rounded-2xl flex items-center justify-center text-5xl">📺</div>
                <div>
                    <h1 class="text-3xl font-semibold tracking-tight text-orange-500" style="text-shadow: 0 0 10px rgba(249,115,22,0.35), 0 2px 12px rgba(249,115,22,0.18);">GPON TV</h1>
                    <p class="text-white text-sm">NOC REPORTE DE CANALES</p>
                </div>
            </div>
            
            <div id="current-datetime" class="font-mono text-lg text-slate-400 tracking-widest"></div>
            
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-8">
                    <div class="text-right">
                        <div class="text-xs text-slate-400">TOTAL</div>
                        <div id="total-channels" class="text-4xl font-semibold">0</div>
                    </div>
                    <div class="text-right">
                        <div class="text-xs text-slate-400">INCIDENCIAS</div>
                        <div id="incidents-count" class="text-4xl font-semibold text-red-400">0</div>
                    </div>
                </div>
                <button onclick="toggleForm()" id="toggle-form-btn"
                        class="flex items-center gap-2 px-5 py-2.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-3xl text-sm font-medium">
                    <span id="form-icon">▲</span>
                    <span id="form-text">Panel</span>
                </button>
            </div>
        </div>

        <!-- BOTÓN TEMA -->
        <button onclick="toggleTheme()" id="theme-toggle"
                class="fixed top-6 right-6 z-50 flex items-center justify-center w-12 h-12 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-3xl text-2xl shadow-xl">
            🌙
        </button>

        <!-- FORMULARIO -->
        <div id="form-container" class="bg-black border border-zinc-800 rounded-3xl p-5 mb-7">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-3 text-white">➕ Agregar nuevo canal</h2>
            <div class="flex gap-4">
                <div class="w-28">
                    <label class="block text-xs font-medium text-slate-400 mb-1">NÚMERO</label>
                    <input id="channel-number" type="text" placeholder="7"
                           class="w-full bg-zinc-950 border border-zinc-800 focus:border-orange-400 rounded-2xl px-5 py-4 text-2xl font-mono font-bold outline-none text-center">
                </div>
                <div class="flex-1">
                    <label class="block text-xs font-medium text-slate-400 mb-1">NOMBRE DEL CANAL</label>
                    <input id="channel-name" type="text" placeholder="América TV"
                           class="w-full bg-zinc-950 border border-zinc-800 focus:border-orange-400 rounded-2xl px-5 py-4 text-lg outline-none">
                </div>
                <button onclick="addChannel()"
                        class="mt-6 bg-orange-500 hover:bg-orange-400 text-black font-bold px-8 py-4 rounded-3xl text-base shadow-lg">
                    AGREGAR
                </button>
            </div>
        </div>

        <!-- LISTADO -->
        <div class="flex justify-between items-center mb-5">
            <h2 id="view-title" class="text-2xl font-semibold text-white">Todos los canales</h2>
           
            <div class="flex items-center gap-3 flex-1 justify-end">
                <div class="relative w-64 md:w-77">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm">🔍</span>
                    <input
                        id="search-input"
                        type="text"
                        placeholder="Buscar canal..."
                        oninput="updateSearch(this.value)"
                        class="w-full bg-zinc-950 border border-zinc-800 focus:border-orange-400 rounded-3xl pl-12 pr-5 py-3 text-base outline-none"
                    >
                </div>
                <button onclick="toggleFilter()" id="filter-button"
                        class="flex items-center gap-3 px-5 py-2.5 bg-zinc-950 hover:bg-orange-500/10 border border-zinc-800 rounded-3xl text-sm font-medium shrink-0">
                    <span id="filter-icon">🔴</span>
                    <span id="filter-text">FILTRAR INCIDENCIAS</span>
                </button>
                <button onclick="resetAllStates()"
                        class="flex items-center gap-2 px-5 py-2.5 bg-zinc-950 hover:bg-emerald-500/10 hover:text-emerald-400 border border-zinc-800 rounded-3xl text-sm font-medium shrink-0">
                    🔄 REINICIAR ESTADO
                </button>
            </div>
        </div>

        <div id="channels-list" class="space-y-2"></div>
        <div id="empty-state" class="hidden text-center py-16">
            <div class="text-6xl mb-4">📺</div>
            <h3 id="empty-title" class="text-2xl font-medium text-white">No hay canales aún</h3>
            <p id="empty-subtitle" class="text-slate-400 mt-2">Agrega canales usando el formulario superior</p>
        </div>
    </div>

    <!-- BARRA INFERIOR -->
    <div class="fixed bottom-8 right-8 bg-black border border-zinc-800 rounded-3xl px-6 py-3 flex items-center gap-4 shadow-2xl">
        <div onclick="toggleFilter()" class="cursor-pointer flex items-center gap-3">
            <div id="footer-dot" class="w-3.5 h-3.5 bg-orange-500 rounded-full"></div>
            <span id="footer-text" class="font-medium text-sm">0 incidencias</span>
        </div>
        <div class="w-px h-4 bg-zinc-700"></div>
        <div class="flex items-center gap-1.5" title="Estado de sincronización en tiempo real">
            <div id="realtime-dot" class="w-2 h-2 rounded-full bg-yellow-400"></div>
            <span id="realtime-label" class="text-xs text-slate-500 font-mono tracking-wide">CONECTANDO…</span>
        </div>
        <div class="w-px h-4 bg-zinc-700"></div>
        <button onclick="exportData()" class="text-xs px-4 py-1.5 hover:bg-zinc-950 border border-zinc-800 rounded-2xl">
            Exportar CSV
        </button>
        <label class="text-xs px-4 py-1.5 hover:bg-zinc-950 border border-zinc-800 rounded-2xl cursor-pointer">
            Importar CSV
            <input type="file" id="import-file" accept=".csv" class="hidden" onchange="importCSV(this)">
        </label>
        <button onclick="deleteAllChannels()" class="text-xs px-4 py-1.5 hover:bg-red-500/10 hover:text-red-400 border border-zinc-800 rounded-2xl transition-colors">
            🗑 Limpiar
        </button>
    </div>

    <script>
        // ==================== SUPABASE CONFIG ====================
        const supabaseUrl = 'https://eongnockquilwrsbcfyl.supabase.co';
        const supabaseKey = 'sb_publishable_tPgHuR7fjTFhEEX-rHk8BQ_TD15xsIf';
        const sb = window.supabase.createClient(supabaseUrl, supabaseKey, {
            realtime: { params: { eventsPerSecond: 20 } }
        });

        let channels = [];
        let filterOnlyIncidents = false;
        let formVisible = true;
        let isDarkMode = true;
        let searchQuery = '';
        let operationInProgress = false;

        // ==================== TIMER DE AVERÍA (localStorage) ====================
        const incidentStart = {};
        const LS_KEY = 'gpontv_incident_starts';

        function lsGetAll() {
            try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch { return {}; }
        }
        function lsSaveAll(obj) {
            localStorage.setItem(LS_KEY, JSON.stringify(obj));
        }
        function lsSetTimer(id, ts) {
            const obj = lsGetAll(); obj[id] = ts; lsSaveAll(obj);
        }
        function lsClearTimer(id) {
            const obj = lsGetAll(); delete obj[id]; lsSaveAll(obj);
        }
        function lsClearAllTimers() {
            localStorage.removeItem(LS_KEY);
        }

        function formatDuration(seconds) {
            const totalMinutes = Math.floor(seconds / 60);
            if (totalMinutes < 1) return `< 1m`;
            if (seconds < 3600) return `${totalMinutes}m`;
            if (seconds < 86400) {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                return m > 0 ? `${h}h ${m}m` : `${h}h`;
            }
            const d = Math.floor(seconds / 86400);
            const h = Math.floor((seconds % 86400) / 3600);
            return h > 0 ? `${d}d ${h}h` : `${d}d`;
        }

        function tickTimers() {
            const now = Date.now();
            document.querySelectorAll('[data-timer-id]').forEach(el => {
                const id = parseInt(el.dataset.timerId);
                const start = incidentStart[id];
                if (start) {
                    el.textContent = formatDuration((now - start) / 1000);
                }
            });
        }

        // Fuente de verdad: localStorage del navegador.
        // Al recargar, recupera el timestamp original -> el contador nunca se reinicia.
        function syncIncidentStart(ch) {
            if (hasProblem(ch)) {
                const stored = lsGetAll();
                if (stored[ch.id]) {
                    // Ya habia un timestamp guardado -> usarlo tal cual
                    incidentStart[ch.id] = stored[ch.id];
                } else {
                    // Averia nueva -> grabar ahora
                    const now = Date.now();
                    incidentStart[ch.id] = now;
                    lsSetTimer(ch.id, now);
                }
            } else {
                delete incidentStart[ch.id];
                lsClearTimer(ch.id);
            }
        }

        // ==================== MUTEX ====================
        async function withLock(fn) {
            if (operationInProgress) return;
            operationInProgress = true;
            showLoading(true);
            try { await fn(); }
            finally { operationInProgress = false; showLoading(false); }
        }

        function showLoading(show) {
            document.getElementById('loading-overlay').classList.toggle('hidden', !show);
        }

        // ==================== DEBOUNCE ====================
        const pendingUpdates = {};

        function debouncedUpdate(id, fields, delayMs = 400) {
            if (pendingUpdates[id]) {
                clearTimeout(pendingUpdates[id].timer);
                Object.assign(pendingUpdates[id].fields, fields);
            } else {
                pendingUpdates[id] = { fields: { ...fields } };
            }
            pendingUpdates[id].timer = setTimeout(async () => {
                const f = pendingUpdates[id].fields;
                delete pendingUpdates[id];
                await updateChannelInDB(id, f);
            }, delayMs);
        }

        // ==================== SUPABASE ====================
        async function loadChannels() {
            const { data, error } = await sb
                .from('GPONTV').select('*').order('number', { ascending: true });
            if (error) { console.error('Load error:', error); return; }

            const allRows = data || [];
            const seen = new Map();
            const toDelete = [];
            for (const row of allRows) {
                const key = String(row.number).trim();
                if (seen.has(key)) { toDelete.push(row.id); }
                else { seen.set(key, row); }
            }
            if (toDelete.length > 0) {
                await sb.from('GPONTV').delete().in('id', toDelete);
            }
            channels = Array.from(seen.values()).map(r => ({
                id: r.id, number: r.number, name: r.name,
                image: r.image, sound: r.sound,
                incident_since: r.incident_since || null
            }));
            channels.forEach(syncIncidentStart);
        }

        async function insertChannel(number, name) {
            const { data, error } = await sb
                .from('GPONTV')
                .insert([{ number, name, image: true, sound: true, incident_since: null }])
                .select().single();
            if (error) { console.error('Insert error:', error); alert('Error al guardar: ' + error.message); return null; }
            return data;
        }

        async function updateChannelInDB(id, fields) {
            const { error } = await sb.from('GPONTV').update(fields).eq('id', id);
            if (error) console.error('Update error:', error);
        }

        async function deleteChannelFromDB(id) {
            const { error } = await sb.from('GPONTV').delete().eq('id', id);
            if (error) { console.error('Delete error:', error); alert('Error al eliminar: ' + error.message); }
        }

        async function resetAllInDB() {
            const now = new Date().toISOString();
            await Promise.all(
                channels.map(ch => sb.from('GPONTV').update({ image: true, sound: true, incident_since: null }).eq('id', ch.id))
            );
        }

        // ==================== REINICIAR ====================
        async function resetAllStates() {
            if (channels.length === 0) return;
            if (!confirm("¿Reiniciar todos los estados?\nTodos pasarán a ESTABLE (Imagen y Audio: SÍ)")) return;
            await withLock(async () => {
                await resetAllInDB();
                channels.forEach(ch => {
                    ch.image = true;
                    ch.sound = true;
                });
                lsClearAllTimers();
                Object.keys(incidentStart).forEach(k => delete incidentStart[k]);
                renderChannels();
            });
        }

        // ==================== RENDER ====================
        let lastRenderedIds = '';

        function renderChannels() {
            sortChannels();
            const container = document.getElementById('channels-list');
            const empty    = document.getElementById('empty-state');

            let displayed = filterOnlyIncidents
                ? channels.filter(ch => hasProblem(ch))
                : [...channels];
            if (searchQuery) {
                displayed = displayed.filter(ch =>
                    ch.number.toString().includes(searchQuery) ||
                    ch.name.toLowerCase().includes(searchQuery)
                );
            }

            const incidentCount = channels.filter(ch => hasProblem(ch)).length;
            document.getElementById('total-channels').textContent   = channels.length;
            document.getElementById('incidents-count').textContent  = incidentCount;
            document.getElementById('footer-text').textContent      = `${incidentCount} incidencias`;
            document.getElementById('footer-dot').className = incidentCount > 0
                ? "w-3.5 h-3.5 bg-red-500 rounded-full animate-pulse"
                : "w-3.5 h-3.5 bg-orange-500 rounded-full";
            document.getElementById('view-title').textContent = filterOnlyIncidents
                ? `Canales con incidencias (${displayed.length})`
                : `Todos los canales (${channels.length})`;

            if (displayed.length === 0) {
                container.innerHTML = '';
                empty.classList.remove('hidden');
                document.getElementById('empty-title').textContent    = searchQuery ? "No se encontraron canales" : filterOnlyIncidents ? "Sin incidencias activas" : "No hay canales aún";
                document.getElementById('empty-subtitle').textContent = searchQuery ? "Prueba con otro número o nombre" : filterOnlyIncidents ? "Todos los canales están estables ✔" : "Agrega canales usando el formulario superior";
                lastRenderedIds = '';
                return;
            }
            empty.classList.add('hidden');

            const idFingerprint = displayed.map(ch => ch.id).join('|');

            if (idFingerprint !== lastRenderedIds) {
                lastRenderedIds = idFingerprint;
                container.innerHTML = '';
                displayed.forEach(ch => container.appendChild(buildCard(ch)));
            } else {
                displayed.forEach(ch => {
                    const existingCard = container.querySelector(`[data-id="${ch.id}"]`);
                    if (existingCard) updateCardInPlace(existingCard, ch);
                });
            }
        }

        function buildTimerHTML(ch) {
            if (!hasProblem(ch)) return '';
            const start = incidentStart[ch.id];
            const secs = start ? (Date.now() - start) / 1000 : 0;
            return `<span class="incident-timer">
                        <span class="dot"></span>
                        <span data-timer-id="${ch.id}">${formatDuration(secs)}</span>
                    </span>`;
        }

        function buildCard(channel) {
            const problem = hasProblem(channel);
            const card = document.createElement('div');
            card.dataset.id = channel.id;
            card.className = `channel-card flex items-center justify-between bg-black border ${problem ? 'border-red-500' : 'border-zinc-800'} rounded-3xl px-6 py-4`;
            card.innerHTML = `
                <div class="flex items-center gap-6">
                    <div class="w-14 text-center">
                        <div class="text-3xl font-mono font-bold text-orange-400">${channel.number}</div>
                    </div>
                    <div><div class="text-xl font-semibold">${channel.name}</div></div>
                </div>
                <div class="flex items-center gap-8">
                    <div class="flex items-center gap-3">
                        <span class="text-white font-medium w-14 text-sm">IMAGEN</span>
                        <span data-label="image" class="status-text ${channel.image ? 'text-yes' : 'text-no'}">${channel.image ? 'SÍ' : 'NO'}</span>
                        <label class="switch">
                            <input type="checkbox" ${channel.image ? 'checked' : ''} onchange="updateImage(${channel.id}, this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-white font-medium w-14 text-sm">AUDIO</span>
                        <span data-label="sound" class="status-text ${channel.sound ? 'text-yes' : 'text-no'}">${channel.sound ? 'SÍ' : 'NO'}</span>
                        <label class="switch">
                            <input type="checkbox" ${channel.sound ? 'checked' : ''} onchange="updateSound(${channel.id}, this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="flex items-center gap-2">
                        <div data-label="status" class="${problem ? 'status-problem' : 'status-ok'} px-6 py-2 rounded-3xl font-bold text-base shadow-inner min-w-[110px] text-center">
                            ${problem ? 'INCIDENCIA' : 'ESTABLE'}
                        </div>
                        <div data-label="timer-wrap">${buildTimerHTML(channel)}</div>
                    </div>
                    <button onclick="deleteChannel(${channel.id})" class="ml-3 text-2xl text-slate-400 hover:text-red-400">✕</button>
                </div>
            `;
            return card;
        }

        function updateCardInPlace(card, channel) {
            const problem = hasProblem(channel);
            card.className = `channel-card flex items-center justify-between bg-black border ${problem ? 'border-red-500' : 'border-zinc-800'} rounded-3xl px-6 py-4`;
            const imgLabel = card.querySelector('[data-label="image"]');
            if (imgLabel) { imgLabel.className = `status-text ${channel.image ? 'text-yes' : 'text-no'}`; imgLabel.textContent = channel.image ? 'SÍ' : 'NO'; }
            const checkboxes = card.querySelectorAll('input[type="checkbox"]');
            if (checkboxes[0]) checkboxes[0].checked = channel.image;
            const sndLabel = card.querySelector('[data-label="sound"]');
            if (sndLabel) { sndLabel.className = `status-text ${channel.sound ? 'text-yes' : 'text-no'}`; sndLabel.textContent = channel.sound ? 'SÍ' : 'NO'; }
            if (checkboxes[1]) checkboxes[1].checked = channel.sound;
            const badge = card.querySelector('[data-label="status"]');
            if (badge) {
                badge.className = `${problem ? 'status-problem' : 'status-ok'} px-6 py-2 rounded-3xl font-bold text-base shadow-inner min-w-[110px] text-center`;
                badge.textContent = problem ? 'INCIDENCIA' : 'ESTABLE';
            }
            // Actualizar el timer wrap (aparece/desaparece según estado)
            const timerWrap = card.querySelector('[data-label="timer-wrap"]');
            if (timerWrap) timerWrap.innerHTML = buildTimerHTML(channel);
        }

        // ==================== HELPERS ====================
        function hasProblem(ch) { return !ch.image || !ch.sound; }
        function sortChannels() { channels.sort((a, b) => parseInt(a.number) - parseInt(b.number)); }

        // ==================== DATETIME ====================
        function updateDateTime() {
            const now = new Date(new Date().toLocaleString("en-US", { timeZone: "America/Lima" }));
            const pad = n => n.toString().padStart(2, '0');
            const el = document.getElementById('current-datetime');
            if (el) el.textContent = `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
        }

        // ==================== CRUD ====================
        async function addChannel() {
            const number = document.getElementById('channel-number').value.trim();
            const name   = document.getElementById('channel-name').value.trim();
            if (!number || !name) { alert("Por favor ingresa el número y nombre del canal"); return; }
            if (channels.some(ch => String(ch.number) === String(number))) {
                if (!confirm(`Ya existe el canal ${number}. ¿Agregar de todas formas?`)) return;
            }
            await withLock(async () => {
                const { data: existing } = await sb.from('GPONTV').select('id').eq('number', number);
                if (existing && existing.length > 0) {
                    if (!confirm(`En la base de datos ya existe el canal ${number}. ¿Agregar de todas formas?`)) return;
                }
                const newCh = await insertChannel(number, name);
                if (newCh) {
                    channels.push({ id: newCh.id, number: newCh.number, name: newCh.name, image: newCh.image, sound: newCh.sound, incident_since: null });
                    document.getElementById('channel-number').value = '';
                    document.getElementById('channel-name').value = '';
                    lastRenderedIds = '';
                    renderChannels();
                }
            });
        }

        async function deleteChannel(id) {
            if (!confirm("¿Eliminar este canal?")) return;
            await withLock(async () => {
                await deleteChannelFromDB(id);
                channels = channels.filter(ch => ch.id !== id);
                delete incidentStart[id];
                lastRenderedIds = '';
                renderChannels();
            });
        }

        function updateImage(id, value) {
            const ch = channels.find(c => c.id === id);
            if (!ch) return;
            ch.image = value;
            syncIncidentStart(ch);
            renderChannels();
            debouncedUpdate(id, { image: value });
        }

        function updateSound(id, value) {
            const ch = channels.find(c => c.id === id);
            if (!ch) return;
            ch.sound = value;
            syncIncidentStart(ch);
            renderChannels();
            debouncedUpdate(id, { sound: value });
        }

        // ==================== BUSCADOR ====================
        function updateSearch(value) {
            searchQuery = value.toLowerCase().trim();
            renderChannels();
        }

        // ==================== UI TOGGLES ====================
        function toggleForm() {
            formVisible = !formVisible;
            document.getElementById('form-container').style.display = formVisible ? 'block' : 'none';
            document.getElementById('form-icon').textContent = formVisible ? '▲' : '▼';
            localStorage.setItem('formVisible', formVisible);
        }

        function toggleFilter() {
            filterOnlyIncidents = !filterOnlyIncidents;
            const btn = document.getElementById('filter-button');
            document.getElementById('filter-icon').textContent = filterOnlyIncidents ? '📋' : '🔴';
            document.getElementById('filter-text').textContent = filterOnlyIncidents ? 'FILTRAR TODOS' : 'FILTRAR INCIDENCIAS';
            btn.classList.toggle('bg-orange-500', filterOnlyIncidents);
            btn.classList.toggle('text-white', filterOnlyIncidents);
            lastRenderedIds = '';
            renderChannels();
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('light', !isDarkMode);
            document.getElementById('theme-toggle').innerHTML = isDarkMode ? '☀️' : '🌙';
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
        }

        // ==================== EXPORT / IMPORT ====================
        async function deleteAllChannels() {
            if (channels.length === 0) return alert("No hay canales para eliminar");
            if (!confirm(`¿Eliminar los ${channels.length} canales? Esta acción no se puede deshacer.`)) return;
            await withLock(async () => {
                await sb.from('GPONTV').delete().gte('id', 0);
                channels = [];
                Object.keys(incidentStart).forEach(k => delete incidentStart[k]);
                lastRenderedIds = '';
                filterOnlyIncidents = false;
                searchQuery = '';
                document.getElementById('search-input').value = '';
                renderChannels();
            });
        }

        function exportData() {
            if (channels.length === 0) return alert("No hay datos para exportar");
            let csv = "Número,Nombre,Imagen,Audio,Estado,Tiempo_Avería\n";
            channels.forEach(ch => {
                const start = incidentStart[ch.id];
                const tiempoAveria = start ? formatDuration((Date.now() - start) / 1000) : '';
                csv += `${ch.number},${ch.name},${ch.image ? "SÍ" : "NO"},${ch.sound ? "SÍ" : "NO"},${hasProblem(ch) ? "INCIDENCIA" : "ESTABLE"},${tiempoAveria}\n`;
            });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            a.download = `gpon_tv_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
        }

        function importCSV(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                const lines = e.target.result.trim().split('\n');
                const newChannels = [];
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    const [number, name, image, sound] = lines[i].split(',').map(s => s.trim());
                    if (number && name) newChannels.push({ number, name, image: image === "SÍ", sound: sound === "SÍ", incident_since: null });
                }
                if (newChannels.length === 0) { alert("No se encontraron canales válidos en el CSV"); return; }
                if (channels.length > 0 && !confirm(`¿Reemplazar los ${channels.length} canales actuales con ${newChannels.length} del CSV?`)) return;

                await withLock(async () => {
                    await sb.from('GPONTV').delete().gte('id', 0);
                    channels = [];
                    Object.keys(incidentStart).forEach(k => delete incidentStart[k]);
                    const { data } = await sb.from('GPONTV').insert(newChannels).select();
                    if (data) {
                        channels = data.map(r => ({ id: r.id, number: r.number, name: r.name, image: r.image, sound: r.sound, incident_since: r.incident_since || null }));
                        channels.forEach(syncIncidentStart);
                    }
                    filterOnlyIncidents = false;
                    searchQuery = '';
                    document.getElementById('search-input').value = '';
                    lastRenderedIds = '';
                    renderChannels();
                    alert(`Se importaron ${channels.length} canales`);
                });
            };
            reader.readAsText(file);
            input.value = '';
        }

        // ==================== REALTIME ====================
        let realtimeChannel = null;
        let realtimeRetryTimer = null;

        function setRealtimeStatus(status) {
            const dot = document.getElementById('realtime-dot');
            const label = document.getElementById('realtime-label');
            if (!dot || !label) return;
            const map = {
                connected:    { cls: 'bg-green-500',  text: 'ONLINE' },
                disconnected: { cls: 'bg-red-500',    text: 'SIN CONEXIÓN' },
                reconnecting: { cls: 'bg-yellow-400', text: 'RECONECTANDO…' },
            };
            const s = map[status] || map.disconnected;
            dot.className   = `w-2 h-2 rounded-full ${s.cls} ${status === 'connected' ? 'animate-pulse' : ''}`;
            label.textContent = s.text;
        }

        function setupRealtime() {
            if (realtimeChannel) { sb.removeChannel(realtimeChannel); realtimeChannel = null; }
            clearTimeout(realtimeRetryTimer);
            setRealtimeStatus('reconnecting');

            realtimeChannel = sb.channel('gpontv-live', {
                config: { broadcast: { self: false } }
            });

            realtimeChannel
                .on('postgres_changes', { event: '*', schema: 'public', table: 'GPONTV' }, (payload) => {
                    if (operationInProgress) return;

                    if (payload.eventType === 'INSERT') {
                        const row = payload.new;
                        if (!channels.find(c => c.id === row.id)) {
                            const ch = { id: row.id, number: row.number, name: row.name, image: row.image, sound: row.sound, incident_since: row.incident_since || null };
                            channels.push(ch);
                            syncIncidentStart(ch);
                            lastRenderedIds = '';
                            renderChannels();
                        }
                    } else if (payload.eventType === 'UPDATE') {
                        const row = payload.new;
                        const ch = channels.find(c => c.id === row.id);
                        if (ch) {
                            ch.image = row.image;
                            ch.sound = row.sound;
                            ch.name  = row.name;
                            ch.incident_since = row.incident_since || null;
                            syncIncidentStart(ch);
                            renderChannels();
                        }
                    } else if (payload.eventType === 'DELETE') {
                        const id = payload.old.id;
                        channels = channels.filter(c => c.id !== id);
                        delete incidentStart[id];
                        lastRenderedIds = '';
                        renderChannels();
                    }
                })
                .subscribe((status, err) => {
                    if (status === 'SUBSCRIBED') {
                        setRealtimeStatus('connected');
                        clearTimeout(realtimeRetryTimer);
                    } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
                        setRealtimeStatus('disconnected');
                        realtimeRetryTimer = setTimeout(setupRealtime, 5000);
                    }
                });
        }

        // ==================== INIT ====================
        window.onload = async () => {
            if (localStorage.getItem('theme') === 'light') {
                isDarkMode = false;
                document.body.classList.add('light');
                document.getElementById('theme-toggle').innerHTML = '☀️';
            }
            const savedForm = localStorage.getItem('formVisible');
            formVisible = savedForm !== 'false';
            document.getElementById('form-container').style.display = formVisible ? 'block' : 'none';
            document.getElementById('form-icon').textContent = formVisible ? '▲' : '▼';

            showLoading(true);
            await loadChannels();
            showLoading(false);

            renderChannels();
            setupRealtime();

            updateDateTime();
            setInterval(updateDateTime, 1000);

            // Tick de timers cada segundo (sin reconstruir DOM)
            setInterval(tickTimers, 1000);

            document.getElementById('channel-name').addEventListener('keypress', e => {
                if (e.key === 'Enter') addChannel();
            });
        };
    </script>
</body>
